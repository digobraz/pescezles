name: Deploy to WebSupport

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASS }}
          server-dir: /pescezles.sk/web/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            .github/**

      - name: Upload .htaccess via curl
        run: curl -T .htaccess ftp://${{ secrets.SERVER }}/pescezles.sk/web/.htaccess --user ${{ secrets.USERNAME }}:${{ secrets.PASS }}
