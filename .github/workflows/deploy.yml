name: Deploy to WebSupport

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASS }}
          server-dir: /pescezles.sk/web/
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            .github/**

      - name: Upload .htaccess via Python FTP
        run: |
          python3 - <<'EOF'
          import ftplib
          ftp = ftplib.FTP()
          ftp.connect('${{ secrets.SERVER }}', 21)
          ftp.login('${{ secrets.USERNAME }}', '${{ secrets.PASS }}')
          ftp.cwd('/pescezles.sk/web')
          with open('.htaccess', 'rb') as f:
              ftp.storbinary('STOR .htaccess', f)
          ftp.quit()
          print('✓ .htaccess uploaded')
          EOF
